<!-- Jannat Foundation Quiz - Home Page with Donation Slideshow -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Home - Jannat Foundation Quiz</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <style>
    .slide { display: block; opacity: 0; position: absolute; top: 0; left: 0; transition: opacity 1s ease-in-out; }
    .active-slide { opacity: 1; z-index: 10; }
  </style>
</head>
<body class="bg-blue-50 min-h-screen flex flex-col items-center justify-center p-4">
  <div class="w-full max-w-md bg-white shadow-lg rounded-2xl p-6 text-center">
    <h1 class="text-3xl font-bold text-blue-700 mb-4">Welcome to Jannat Foundation Quiz</h1>
    <p class="text-sm text-gray-600 mb-6">Participate, win ₹1500, and support a charitable cause!</p>

    <!-- Donation Slideshow -->
    <div class="mb-6 w-full max-w-md mx-auto">
      <div class="text-center text-sm font-semibold text-gray-600 mb-2">Recent Donations</div>
      <div class="relative h-52 rounded-xl overflow-hidden">
        <img src="images/donation1.jpg" class="slide active-slide w-full h-full object-cover rounded-xl" />
        <img src="images/donation2.jpg" class="slide w-full h-full object-cover rounded-xl" />
        <img src="images/donation3.jpg" class="slide w-full h-full object-cover rounded-xl" />
      </div>
    </div>

    <div class="space-y-4">
      <a href="register.html" class="block w-full bg-blue-600 text-white py-2 rounded-xl font-semibold hover:bg-blue-700">Register & Play</a>
      <a href="leaderboard.html" class="block w-full border border-blue-600 text-blue-600 py-2 rounded-xl font-semibold hover:bg-blue-100">View Leaderboard</a>
    </div>
  </div>

  <footer class="text-xs text-gray-500 text-center mt-6">© 2025 Jannat Foundation Trust</footer>

  <script>
    let slideIndex = 0;
    const slides = document.querySelectorAll(".slide");

    function showSlides() {
      slides.forEach((slide, i) => {
        slide.classList.remove("active-slide");
        slide.style.opacity = "0";
        if (i === slideIndex) {
          slide.classList.add("active-slide");
          slide.style.opacity = "1";
        }
      });
      slideIndex = (slideIndex + 1) % slides.length;
    }

    setInterval(showSlides, 2500);
  </script>
</body>
</html>
