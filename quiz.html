<!-- Jannat Foundation Quiz - Quiz Page -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz - Jannat Foundation</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-blue-50 min-h-screen flex flex-col items-center justify-center p-4">
  <div class="w-full max-w-md bg-white rounded-2xl shadow-lg p-6">
    <h1 class="text-2xl font-bold text-center text-blue-700 mb-4">Jannat Foundation Quiz</h1>
    <div id="quiz-container" class="space-y-4 text-sm"></div>
<div id="timer" class="text-right text-blue-500 font-bold mt-2"></div>
    <div class="mt-4 text-center">
      <button id="start-quiz" class="bg-blue-600 text-white py-2 px-4 rounded-xl">Start Quiz</button>
    </div>
  </div>

  <script>
    const backendURL = "https://jannat-backend.onrender.com";

    const questions = [
      {
        question: "What is the capital of India?",
        options: ["Mumbai", "Delhi", "Kolkata", "Chennai"],
        correctAnswer: 1,
        type: "easy"
      },
      {
        question: "Who was the first President of India?",
        options: ["Dr. Rajendra Prasad", "Dr. Abdul Kalam", "Jawaharlal Nehru", "Sardar Patel"],
        correctAnswer: 0,
        type: "easy"
      },
      {
        question: "Which of these is a renewable energy source?",
        options: ["Coal", "Wind", "Petrol"],
        correctAnswer: 1,
        type: "easy"
      },
      {
        question: "In which year did India gain independence?",
        options: ["1945", "1946", "1947", "1950"],
        correctAnswer: 2,
        type: "easy"
      },
      {
        question: "Which Indian scientist won a Nobel Prize in Physics?",
        options: ["C. V. Raman", "Homi Bhabha", "Vikram Sarabhai", "A. P. J. Abdul Kalam"],
        correctAnswer: 0,
        type: "hard"
      }
    ];

    let currentQuestion = 0;
    let score = 0;
    let timer;

    function startTimer(duration) {
      clearInterval(timer);
      let timeLeft = duration;
      const timerEl = document.getElementById("timer");
      timerEl.innerText = `⏱️ ${timeLeft}s`;
      timer = setInterval(() => {
        timeLeft--;
        timerEl.innerText = `⏱️ ${timeLeft}s`;
        if (timeLeft <= 0) {
          clearInterval(timer);
          showNextQuestion();
        }
      }, 1000);
    }

    function showNextQuestion() {
      const container = document.getElementById("quiz-container");
      if (currentQuestion >= questions.length) {
        // Submit score to backend
        const name = localStorage.getItem("quizUserName") || "Unknown";
        const city = localStorage.getItem("quizUserCity") || "Unknown";

fetch("https://jannat-backend.onrender.com/submit-score", {
  method: "POST",
  headers: { "Content-Type": "application/json" },
  body: JSON.stringify({ name, city, score, status: "Pending" })
});
        .then(() => {
          container.innerHTML = `<div class='text-center font-semibold text-green-600'>Quiz Completed!<br>Your Score: ${score}/${questions.length}</div>`;
          document.getElementById("start-quiz").innerText = "Try Again";
          document.getElementById("start-quiz").style.display = "inline-block";
        })
        .catch(() => {
          container.innerHTML = `<div class='text-red-600 text-center'>Failed to submit score. Try again later.</div>`;
        });
        return;
      }

      const q = questions[currentQuestion];
      const time = q.type === "hard" ? 30 : 20;
      startTimer(time);

      container.innerHTML = `
        <div class="font-semibold">Q${currentQuestion + 1}: ${q.question}</div>
        <ul class="space-y-2">
          ${q.options.map((opt, i) => `<li><button onclick="checkAnswer(${i})" class="w-full bg-gray-100 hover:bg-blue-100 rounded p-2 text-left">${String.fromCharCode(65 + i)}. ${opt}</button></li>`).join('')}
        </ul>
        <div id="timer" class="text-right text-blue-500 font-bold mt-2"></div>
      `;
    }

    function checkAnswer(selected) {
      const correct = questions[currentQuestion].correctAnswer;
      if (selected === correct) score++;
      currentQuestion++;
      showNextQuestion();
    }

    document.getElementById("start-quiz").addEventListener("click", () => {
      currentQuestion = 0;
      score = 0;
      showNextQuestion();
    });
  </script>
</body>
</html>
