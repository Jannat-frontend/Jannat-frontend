<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin - Upload Question</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet" />
</head>
<body class="bg-blue-50 min-h-screen flex items-center justify-center p-4">
  <div class="bg-white p-6 rounded-2xl shadow-lg w-full max-w-md">
    <h2 class="text-xl font-bold text-center text-blue-700 mb-4">Upload New Quiz Question</h2>
    <form id="questionForm" class="space-y-4">
      <textarea id="question" class="w-full border rounded-xl p-2" placeholder="Enter Question" required></textarea>
      <input type="text" id="optionA" class="w-full border rounded-xl p-2" placeholder="Option A" required />
      <input type="text" id="optionB" class="w-full border rounded-xl p-2" placeholder="Option B" required />
      <input type="text" id="optionC" class="w-full border rounded-xl p-2" placeholder="Option C" required />
      <input type="text" id="optionD" class="w-full border rounded-xl p-2" placeholder="Option D" required />

      <select id="correctAnswer" class="w-full border rounded-xl p-2" required>
        <option value="">Select Correct Option</option>
        <option value="A">A</option>
        <option value="B">B</option>
        <option value="C">C</option>
        <option value="D">D</option>
      </select>

      <select id="type" class="w-full border rounded-xl p-2" required>
        <option value="">Select Difficulty</option>
        <option value="easy">Easy</option>
        <option value="hard">Hard</option>
      </select>

      <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded-xl hover:bg-blue-700">Upload Question</button>
      <div id="message" class="text-center text-sm mt-2"></div>
    </form>
  </div>

  <script>
    document.getElementById("questionForm").addEventListener("submit", async function (e) {
      e.preventDefault();
  fetch("https://jannat-backend.onrender.com/api/upload-question", { ... })

      const question = document.getElementById("question").value.trim();
      const options = [
        document.getElementById("optionA").value.trim(),
        document.getElementById("optionB").value.trim(),
        document.getElementById("optionC").value.trim(),
        document.getElementById("optionD").value.trim()
      ];
      const correctLetter = document.getElementById("correctAnswer").value;
      const type = document.getElementById("type").value;

      const correctIndex = { A: 0, B: 1, C: 2, D: 3 }[correctLetter];

      if (!question || options.includes("") || correctIndex === undefined || !type) {
        document.getElementById("message").innerText = "❌ Please fill all fields.";
        return;
      }

      try {
        const res = await fetch(`${backendURL}/upload-question`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ question, options, correctAnswer: correctIndex, type })
        });

        if (res.ok) {
          document.getElementById("message").innerText = "✅ Question uploaded successfully!";
          document.getElementById("questionForm").reset();
        } else {
          document.getElementById("message").innerText = "❌ Failed to upload question.";
        }
      } catch (err) {
        console.error(err);
        document.getElementById("message").innerText = "❌ Server error.";
      }
    });
  </script>
</body>
</html>
