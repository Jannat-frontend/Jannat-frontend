<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Admin - Upload Quiz Questions</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet" />
</head>
<body class="bg-blue-50 min-h-screen flex flex-col items-center justify-start p-6 space-y-6">
  <div class="w-full max-w-xl bg-white shadow-md rounded-xl p-6">
    <h1 class="text-xl font-bold text-center text-blue-700 mb-4">📤 Upload New Quiz Question</h1>
    
    <!-- Single Question Upload Form -->
    <form id="singleForm" class="space-y-4">
      <input type="text" id="question" placeholder="Question" class="w-full p-2 border rounded" required />
      <input type="text" id="option1" placeholder="Option A" class="w-full p-2 border rounded" required />
      <input type="text" id="option2" placeholder="Option B" class="w-full p-2 border rounded" required />
      <input type="text" id="option3" placeholder="Option C" class="w-full p-2 border rounded" />
      <input type="text" id="option4" placeholder="Option D" class="w-full p-2 border rounded" />
      <input type="number" id="correctAnswer" placeholder="Correct Answer Index (0=A, 1=B...)" min="0" max="3" class="w-full p-2 border rounded" required />
      <select id="type" class="w-full p-2 border rounded" required>
        <option value="">Select Difficulty</option>
        <option value="easy">Easy</option>
        <option value="hard">Hard</option>
      </select>
      <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded hover:bg-blue-700">Upload Question</button>
    </form>

    <div id="singleMsg" class="text-sm text-center mt-2"></div>
  </div>

  <!-- Bulk Upload JSON File -->
  <div class="w-full max-w-xl bg-white shadow-md rounded-xl p-6">
    <h2 class="text-lg font-bold text-blue-700 mb-2">📁 Bulk Upload from JSON File</h2>
    <input type="file" id="bulkFile" accept=".json" class="block w-full mb-4" />
    <button onclick="uploadBulk()" class="w-full bg-green-600 text-white py-2 rounded hover:bg-green-700">Upload Bulk Questions</button>
    <div id="bulkMsg" class="text-sm text-center mt-2"></div>
  </div>

  <script>
    const backendURL = "https://jannat-backend.onrender.com";

    // Single question form handler
    document.getElementById("singleForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const q = document.getElementById("question").value;
      const options = [
        document.getElementById("option1").value,
        document.getElementById("option2").value,
        document.getElementById("option3").value,
        document.getElementById("option4").value
      ].filter(opt => opt.trim() !== "");
      const correct = parseInt(document.getElementById("correctAnswer").value);
      const type = document.getElementById("type").value;

      try {
        const res = await fetch(`${backendURL}/api/upload-question`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ question: q, options, correctAnswer: correct, type })
        });

        const msg = document.getElementById("singleMsg");
        if (res.ok) {
          msg.textContent = "✅ Question uploaded successfully!";
          msg.className = "text-green-600 text-center mt-2";
          e.target.reset();
        } else {
          msg.textContent = "❌ Failed to upload question.";
          msg.className = "text-red-600 text-center mt-2";
        }
      } catch (err) {
        console.error(err);
        document.getElementById("singleMsg").textContent = "❌ Server error.";
      }
    });

    // Bulk upload handler
    async function uploadBulk() {
      const fileInput = document.getElementById("bulkFile");
      const bulkMsg = document.getElementById("bulkMsg");

      if (!fileInput.files.length) {
        bulkMsg.textContent = "Please select a .json file to upload.";
        bulkMsg.className = "text-red-600 text-center mt-2";
        return;
      }

      const file = fileInput.files[0];
      const reader = new FileReader();

      reader.onload = async (e) => {
        try {
          const questions = JSON.parse(e.target.result);
          let successCount = 0;

          for (const q of questions) {
            const res = await fetch(`${backendURL}/api/upload-question`, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(q)
            });
	 const text = await res.text(); // log response text
 	 console.log("Uploading:", q.question, "| Status:", res.status, "| Response:", text);
            if (res.ok) successCount++;
          }

          bulkMsg.textContent = `✅ ${successCount} questions uploaded successfully!`;
          bulkMsg.className = "text-green-600 text-center mt-2";
        } catch (err) {
          console.error(err);
          bulkMsg.textContent = "❌ Failed to read or upload file.";
          bulkMsg.className = "text-red-600 text-center mt-2";
        }
      };

      reader.readAsText(file);
    }
  </script>
</body>
</html>
